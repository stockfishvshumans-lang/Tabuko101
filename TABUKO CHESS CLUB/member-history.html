<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Career History | Tabuko Chess Club</title>
  <style>
    /* history-styles.css or embedded CSS */

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --accent-primary: #38bdf8;
      --accent-success: #4ade80;
      --accent-warning: #fbbf24;
      --accent-danger: #f87171;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    .dashboard-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      z-index: 10;
    }

    /* Profile Banner */
    .profile-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .profile-name {
      margin: 0 0 1rem 0;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .profile-badges {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .profile-rating {
      text-align: right;
    }

    .rating-val {
      display: block;
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent-primary);
      line-height: 1;
    }

    .rating-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* Analytics Row */
    .analytics-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .analytic-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .ac-val {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    .ac-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Table Elements */
    .log-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
    }

    .log-title {
      padding: 1.5rem 2rem;
      margin: 0;
      font-size: 1.25rem;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
    }

    .table-responsive {
      overflow-x: auto;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .history-table th {
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-table td {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 4rem !important;
      color: var(--text-muted);
    }

    /* Color Badges */
    .color-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 800;
      display: inline-block;
      width: 60px;
      text-align: center;
    }

    .color-badge.white {
      background: #e2e8f0;
      color: #0f172a;
    }

    .color-badge.black {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid var(--border-color);
    }

    /* Result Badges */
    .result-badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 0.9rem;
      display: inline-block;
      min-width: 65px;
      text-align: center;
    }

    .res-win {
      background: rgba(74, 222, 128, 0.1);
      color: var(--accent-success);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .res-loss {
      background: rgba(248, 113, 113, 0.1);
      color: var(--accent-danger);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .res-draw {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .res-pending {
      background: rgba(251, 191, 36, 0.1);
      color: var(--accent-warning);
      border: 1px dashed rgba(251, 191, 36, 0.5);
    }

    /* General Badges */
    .badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-block;
    }

    .badge-warning {
      background: rgba(251, 191, 36, 0.2);
      color: var(--accent-warning);
    }

    .badge-secondary {
      background: rgba(148, 163, 184, 0.2);
      color: var(--text-muted);
    }

    .badge-dark {
      background: rgba(0, 0, 0, 0.5);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: #000;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: white;
      border-color: var(--border-color);
    }

    .btn-secondary:hover {
      background: #475569;
    }

    /* Error Screen */
    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .error-screen h1 {
      color: var(--accent-danger);
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .error-screen p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.25rem;
    }

    /* Loader Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid #FFF;
      border-bottom-color: var(--accent-primary);
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .dashboard-wrapper {
        padding: 1rem;
      }

      .profile-banner {
        flex-direction: column;
        text-align: center;
        gap: 2rem;
        padding: 1.5rem;
      }

      .profile-badges {
        justify-content: center;
        margin-top: 1rem;
      }

      .profile-rating {
        text-align: center;
      }

      .analytics-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .history-table th,
      .history-table td {
        padding: 1rem;
      }
    }

    /* Print Media Queries */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }

      .dashboard-wrapper {
        padding: 0 !important;
        max-width: 100% !important;
      }

      .no-print,
      .toolbar {
        display: none !important;
      }

      .profile-banner {
        background: white !important;
        border: 2px solid black !important;
        box-shadow: none !important;
        color: black !important;
      }

      .profile-name {
        color: black !important;
      }

      .rating-val {
        color: black !important;
      }

      .rating-label,
      .ac-label {
        color: #333 !important;
      }

      .analytic-card {
        background: white !important;
        border: 1px solid #ccc !important;
      }

      .ac-val {
        color: black !important;
      }

      .log-container {
        border: none !important;
      }

      .log-title {
        background: white !important;
        border-bottom: 2px solid black !important;
        color: black !important;
        padding: 1rem 0 !important;
      }

      .history-table th {
        background: #f0f0f0 !important;
        color: black !important;
        border-bottom: 2px solid black !important;
      }

      .history-table td {
        border-bottom: 1px solid #ccc !important;
      }

      .color-badge.white {
        border: 1px solid black !important;
        background: white !important;
        color: black !important;
      }

      .color-badge.black {
        background: black !important;
        color: white !important;
      }

      .result-badge {
        border: 1px solid black !important;
        background: white !important;
        color: black !important;
      }
    }
  </style>
</head>

<body>

  <div id="history-app">
    <!-- Initial Loading State -->
    <div class="modal-overlay active" id="initial-loader">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- App Core -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/history-view.js"></script>

</body>

</html>
