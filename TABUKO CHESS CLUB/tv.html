<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabuko Live Broadcast</title>
  <style>
    :root {
      --bg-tv: #020617; /* Deep Obsidian */
      --card-tv: #0f172a;
      --accent-tv: #38bdf8;
      --text-tv: #f8fafc;
      --border-tv: #1e293b;
      --gold-tv: #facc15;
    }

    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700;900&display=swap');

    body {
      background: var(--bg-tv);
      color: var(--text-tv);
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden; /* Prevent hall TV scrollbars */
      height: 100vh;
    }

    .tv-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px 30px;
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-tv);
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 3rem);
      color: #fff;
      font-weight: 900;
      letter-spacing: -2px;
    }

    #tv-clock {
      font-size: clamp(1.2rem, 2.5vw, 2.5rem);
      font-weight: 900;
      color: var(--accent-tv);
      font-family: 'Roboto Mono', monospace;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }

    .tv-content {
      display: grid;
      grid-template-columns: 1fr minmax(280px, 20%); /* 80/20 Split */
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #475569;
      margin-bottom: 15px;
      font-weight: 900;
    }

    /* ── DYNAMIC PAIRINGS GRID ── */
    #tv-pairings {
      display: grid;
      /* Auto-scaling: packed tightly based on card size */
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      grid-auto-rows: min-content;
      gap: 10px;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .tv-pairing-row {
      background: var(--card-tv) !important;
      border-left: 5px solid var(--accent-tv) !important;
      padding: 10px 15px !important;
      border-radius: 8px;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      height: auto !important; /* Override JS fixed height */
      margin: 0 !important;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .board {
      font-family: 'Roboto Mono', monospace;
      font-weight: 900;
      color: var(--gold-tv);
      font-size: clamp(1.2rem, 1.8vw, 2.2rem);
      min-width: 50px;
    }

    .player {
      font-weight: 700;
      font-size: clamp(0.9rem, 1.2vw, 1.5rem);
      color: #fff;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .white-player { text-align: left; }
    .black-player { text-align: right; }

    .score {
      background: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      font-family: 'Roboto Mono', monospace;
      font-weight: 900;
      font-size: clamp(1rem, 1.3vw, 1.6rem);
      margin: 0 15px;
      border: 1px solid var(--border-tv);
    }

    .tv-rtg {
      display: block;
      font-size: 0.65rem;
      color: #64748b;
      font-weight: 600;
    }

    /* ── LEADERBOARD SIDEBAR ── */
    .standings-sidebar {
      border-left: 2px solid var(--border-tv);
      padding-left: 20px;
      background: rgba(15, 23, 42, 0.3);
    }

    #standings-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 10px;
    }

    .tv-standings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.8); /* Semi-transparent dark slate */
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-tv);
      width: 100%;
      box-sizing: border-box;
      animation: fade-in 0.5s ease-out forwards;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .standings-rank {
      font-weight: 900;
      color: var(--gold-tv);
      width: 30px;
      font-size: 1.4rem;
    }

    .standings-name {
      flex: 1;
      text-align: left;
      margin-left: 15px;
      font-weight: 700;
      color: #f8fafc;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .standings-pts {
      font-family: 'Roboto Mono', monospace;
      font-weight: 900;
      color: var(--accent-tv);
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <div class="tv-layout">
    <header>
      <div style="display:flex;align-items:center;gap:15px;">
        <h1 id="tv-tournament-name">Connecting to Tabuko...</h1>
        <div id="tv-mesh-badge" style="background:#1e293b;border-radius:4px;padding:4px 10px;font-size:0.6rem;font-weight:900;color:#64748b;letter-spacing:1px;border:1px solid #334155;">● Awaiting Mesh</div>
      </div>
      <div id="tv-clock">--:--:--</div>
    </header>

    <div class="tv-content">
      <div class="pairings-section">
        <h3 class="section-title">Live Pairings</h3>
        <div id="tv-pairings">
          <div style="color: #64748b; font-size: 1.5rem; margin-top: 20px;">Fetching board data...</div>
        </div>
      </div>

      <aside class="standings-sidebar">
        <h3 class="section-title">Top 5 Leaderboard</h3>
        <div id="standings-body"></div>
      </aside>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>

  <script src="https://unpkg.com/morphdom@2.6.1/dist/morphdom-umd.js"></script>

  <script src="js/tiebreak.js"></script>
  <script src="js/tie-resolution.js"></script>
  <script src="js/standings.js"></script>

  <script src="js/tv.js"></script>
</body>

</html>
