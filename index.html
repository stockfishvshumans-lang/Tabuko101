  <!-- PWA Service Worker (With Automatic Purge for Version Updates) -->
  <script>
    window.APP_VERSION = '2.1.0_build_85';
    
    if ('serviceWorker' in navigator) {
      const LOCAL_VERSION = localStorage.getItem('tabuko_app_version');
      
      // Automatic Cache-Busting on Version Mismatch
      if (LOCAL_VERSION !== window.APP_VERSION) {
        console.log('[PWA] System Upgrade Available. Purging legacy caches...');
        
        // Unregister stale service workers
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('[PWA] Stale Service Worker Unregistered');
          }
        });

        // Clear all local caches
        if (window.caches) {
          caches.keys().then(names => {
            for (let name of names) caches.delete(name);
            console.log('[PWA] Local Caches Purged for new version.');
          });
        }
        
        localStorage.setItem('tabuko_app_version', window.APP_VERSION);
      }

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('TABUKO CHESS CLUB/sw.js').then(reg => {
          console.log('[PWA] Service Worker Active (Version:', window.APP_VERSION, ')');
        }).catch(err => {
          console.error('[PWA] Registration failed:', err);
        });
      });
    }
